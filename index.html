<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Next.js 性能监控</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
        color: #333;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 800px;
        padding: 2rem;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #0070f3;
        margin-bottom: 1rem;
      }
      p {
        margin-bottom: 1.5rem;
        line-height: 1.5;
      }
      .loading {
        display: inline-block;
        width: 50px;
        height: 50px;
        border: 3px solid rgba(0, 112, 243, 0.3);
        border-radius: 50%;
        border-top-color: #0070f3;
        animation: spin 1s ease-in-out infinite;
        margin-bottom: 1rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .btn {
        display: inline-block;
        background-color: #0070f3;
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 4px;
        text-decoration: none;
        font-weight: 500;
        transition: background-color 0.2s;
      }
      .btn:hover {
        background-color: #005cc5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Next.js 性能监控系统</h1>
      <div class="loading"></div>
      <p>正在初始化 Next.js 应用...</p>
      <p>这是一个临时页面，应用启动后将自动重定向到 Next.js 应用。</p>
      <a href="/app" class="btn">手动进入应用</a>
    </div>
    <script>
      // 检查 Next.js 应用是否已启动
      async function checkAppStatus() {
        try {
          const response = await fetch('/api/health');
          if (response.ok) {
            window.location.href = '/app';
          } else {
            setTimeout(checkAppStatus, 2000);
          }
        } catch (error) {
          setTimeout(checkAppStatus, 2000);
        }
      }
      
      // 页面加载后开始检查
      window.addEventListener('load', () => {
        setTimeout(checkAppStatus, 1000);
      });
    </script>
  </body>
</html>
